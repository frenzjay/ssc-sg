<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Freedom Wall</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --ssc-green: #16a34a; 
            --ssc-gold: #d97706;  
            --brand-white: #FFFFFF;
            --brand-black: #000000;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Press Start 2P', cursive;
            color: var(--brand-black);
            overflow: hidden;
            background: url('back.jpeg') no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(5px);
            border: 6px solid var(--ssc-green);
            box-shadow: 10px 10px 0px var(--ssc-gold); 
            z-index: 10;
            display: flex; flex-direction: column; padding: 25px;
            box-sizing: border-box;
        }
        
        .logo-box { text-align: center; margin-bottom: 20px; }
        .logo-box img { 
            width: 100px; height: 100px; border: 4px solid var(--brand-black); 
            background: #fff;
        }

        h2 { text-align: center; font-size: 0.8rem; margin: 10px 0; text-transform: uppercase; }
        
        label { font-size: 0.6rem; text-transform: uppercase; font-weight: bold; margin-top: 15px; display: block; }
        input, textarea {
            width: 100%; padding: 12px; font-family: 'Press Start 2P', cursive; font-size: 0.7rem;
            border: 2px solid var(--brand-black); outline: none; box-sizing: border-box; margin-top: 5px;
        }
        
        button {
            background: var(--ssc-green); color: white; border: 4px solid var(--brand-black);
            padding: 15px; font-family: 'Press Start 2P', cursive; font-size: 0.8rem;
            cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 25px;
        }
        button:hover { background: var(--ssc-gold); }
        
        #status { margin-top: 15px; text-align: center; font-size: 0.6rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="../logo.jpg" alt="SSC Logo">
        </div>
        
        <h2>SSC FREEDOM WALL</h2>
        <form id="msgForm">
            <label>Sender:</label>
            <input type="text" id="sender" placeholder="Anonymous">
            <label>Message:</label>
            <textarea id="message" required placeholder="Speak your mind..." rows="10"></textarea>
            <button type="submit" id="btn">SUBMIT ></button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('msgForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const SERVER_URL = 'https://itzfrenz.7m.pl/calendar/sscFreedomWall/sscFreedomWall.php';

            const formData = new FormData();
            formData.append('name', document.getElementById('sender').value || 'Anonymous');
            formData.append('message', document.getElementById('message').value);

            btn.disabled = true;
            btn.innerText = "SUBMITTING";

            fetch(SERVER_URL, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    status.style.color = 'var(--ssc-green)';
                    status.innerText = "MESSAGE SUBMITTED";
                    document.getElementById('message').value = "";
                } else {
                    status.style.color = 'red';
                    status.innerText = "-1";
                }
            })
            .catch(() => { status.innerText = "-1"; })
            .finally(() => { btn.disabled = false; btn.innerText = "POST TO WALL >"; });
        });
    </script>
</body>
</html>
