<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Unofficial SSC Student Government Website">
    <title>SSC Student Government</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header window-box">
            <div class="header-branding">
                <img src="logo.jpg" alt="SSC SG Logo" class="sg-logo" onerror="this.style.display='none'">
                <div>
                    <h1>STUDENT GOVERNMENT</h1>
                    <p class="subtitle">SIQUIJOR STATE COLLEGE</p>
                </div>
            </div>
            <div class="toggle-wrapper">
                <a href="board/" style="text-decoration: none;">
                    <button class="btn-retro">VIEW BOARD</button>
                </a>
            </div>
        </header>

        <main class="board">
            
            <div class="card window-box" style="border-top-color: var(--ssc-green);">
                <div class="card-header">
                    <div class="date">WELCOME</div>
                    <div class="badge" style="background-color: var(--ssc-green); color: white;">HOME</div>
                </div>
                <h3>Welcome to the SSC Student Government</h3>
                <div class="markdown-content" style="margin-top: 15px;">
                    <p>No idea what to add here</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                
                <a href="board/" class="card window-box clickable" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; text-align: center; justify-content: center; padding: 40px 20px;">
                    <h3>THE BOARD</h3>
                    <p style="margin: 10px 0 0 0; font-size: 0.9rem;">View the SG Board</p>
                </a>

                <a href="officers/" class="card window-box clickable" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; text-align: center; justify-content: center; padding: 40px 20px;">
                    <h3>ABOUT US</h3>
                    <p style="margin: 10px 0 0 0; font-size: 0.9rem;">Meet the Officers</p>
                </a>
                <a href="freedomwall/" class="card window-box clickable" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; text-align: center; justify-content: center; padding: 40px 20px;">
                    <h3>SSC Freedom Wall</h3>
                    <p style="margin: 10px 0 0 0; font-size: 0.9rem;">Submit your anonymous messages!</p>
                </a>
            </div>
        </main>
    </div>
</body>
</html>
